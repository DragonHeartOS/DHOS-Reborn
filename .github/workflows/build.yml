name: Build project

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build iso
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: git checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Building default package
        run: nix build path:.#default --print-build-logs --accept-flake-config
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result/**
